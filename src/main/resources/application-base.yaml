management:
  endpoint:
    health:
      show-details: always
      group:
        readiness:
          include:
            - db
            - readinessState
        liveness:
          include:
            - livenessState
      status:
        order: DOWN, OUT_OF_SERVICE, DEGRADED, UP, UNKNOWN
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
#  health:
#    circuitbreakers:
#      enabled: true

spring:
  application:
    name: billing
  cloud:
    circuitbreaker:
      http-services:
        enabled: false
  flyway:
    enabled: false
  http:
    clients:
      imperative:
        factory: http_components
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false
  web:
    locale-resolver: fixed
    locale: en_US

algashop:
  integrations:
    payment:
      provider: FASTPAY

resilience4j:
  circuitbreaker:
    instances:
      fastpayCB:
        registerHealthIndicator: true
        slidingWindowType: time_based
        slidingWindowSize: 10
        failureRateThreshold: 50
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        ignoreExceptions:
          - br.dev.allissonnunes.algashop.billing.infrastructure.exception.BadGatewayException.ClientErrorException
  timelimiter:
    instances:
      fastpayCB:
        timeoutDuration: 20s
  retry:
    instances:
      fastpayRetry:
        maxAttempts: 3
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2.0
        waitDuration: 3s
        retryExceptions:
          - br.dev.allissonnunes.algashop.billing.infrastructure.exception.BadGatewayException.ServerErrorException
          - br.dev.allissonnunes.algashop.billing.infrastructure.exception.GatewayTimeoutException